name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      # Vendored yarn (no corepack — node >=25 dropped it). Invoke via node;
      # nested `yarn` calls in scripts resolve through yarn's injected PATH.
      - run: node .yarn/releases/yarn-*.cjs install --immutable
      - run: node .yarn/releases/yarn-*.cjs validate
