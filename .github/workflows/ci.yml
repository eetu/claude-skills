name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
      # Vendored yarn (no corepack — node >=25 dropped it). Invoke via node;
      # nested `yarn` calls in scripts resolve through yarn's injected PATH.
      - run: node .yarn/releases/yarn-*.cjs install --immutable
      - run: node .yarn/releases/yarn-*.cjs validate
